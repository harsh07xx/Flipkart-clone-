<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Flipkart Clone</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Roboto",Arial,sans-serif;background:#f1f3f6;color:#212121}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
img{display:block}
.nb{background:#2874f0;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.ni{max-width:1280px;margin:0 auto;padding:0 16px;height:56px;display:flex;align-items:center;gap:16px}
.lt{font-size:1.25rem;font-weight:700;color:#fff}
.ls{font-size:.6rem;color:#ffe11b;display:block;line-height:1}
.se{flex:1;position:relative;max-width:560px}
.se input{width:100%;height:38px;border-radius:3px;border:none;padding:0 16px 0 40px;font-size:.88rem;outline:none}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none}
.nr{display:flex;align-items:center;gap:8px;margin-left:auto}
.bl{background:#fff;color:#2874f0;font-weight:600;font-size:.88rem;padding:6px 20px;border-radius:3px}
.bc{background:transparent;color:#fff;font-size:.88rem;font-weight:600;position:relative;padding:6px 8px}
.bw{background:transparent;color:#fff;font-size:.88rem;font-weight:600;position:relative;padding:6px 8px}
.bg{background:#ffe11b;color:#2874f0;font-size:.65rem;font-weight:800;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;position:absolute;top:-2px;right:-4px}
.wbg{background:#ff6b6b;color:#fff;font-size:.65rem;font-weight:800;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;position:absolute;top:-2px;right:-4px}
.mn{max-width:1280px;margin:0 auto;padding:20px 12px 48px}
.st{font-size:1.2rem;font-weight:700;margin-bottom:16px}
.gr{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.cd{background:#fff;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.07);display:flex;flex-direction:column;overflow:hidden;transition:box-shadow .18s,transform .18s;cursor:pointer;position:relative}
.cd:hover{box-shadow:0 6px 24px rgba(0,0,0,.14);transform:translateY(-2px)}
.iw{width:100%;height:200px;background:#f8f9fa;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.ci{width:100%;height:100%;object-fit:contain;padding:12px;transition:transform .3s}
.cd:hover .ci{transform:scale(1.05)}
.cb{padding:14px 12px 16px;display:flex;flex-direction:column;gap:6px;flex:1}
.cn{font-size:.88rem;font-weight:500;line-height:1.35}
/* Price row */
.prow{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap;margin-top:2px}
.cp{font-size:1.05rem;font-weight:700;color:#212121}
.cop{font-size:.78rem;color:#878787;text-decoration:line-through}
.dbg{font-size:.78rem;font-weight:700;color:#388e3c}
/* Discount badge on image */
.dstk{position:absolute;top:10px;left:0;background:#e53935;color:#fff;font-size:.68rem;font-weight:700;padding:3px 10px 3px 8px;clip-path:polygon(0 0,100% 0,88% 50%,100% 100%,0 100%);z-index:2;letter-spacing:.02em;min-width:52px}
/* Heart wishlist button */
.hb{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.92);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 5px rgba(0,0,0,.18);transition:transform .15s,background .15s;z-index:3;border:none}
.hb:hover{transform:scale(1.15);background:#fff}
.hb.on{background:#fff2f2}
.hb svg{transition:fill .2s,stroke .2s}
.hb.on svg .hfill{fill:#e53935;stroke:#e53935}
.hfill{fill:none;stroke:#555;stroke-width:1.8}
.btnrow{margin-top:auto;display:flex;gap:8px}
.ba{flex:1;background:#2874f0;color:#fff;font-size:.82rem;font-weight:600;padding:9px 0;border-radius:3px;text-align:center;transition:background .15s}
.ba:hover{background:#1a5dc8}
.bb{flex:1;background:#fb641b;color:#fff;font-size:.82rem;font-weight:600;padding:9px 0;border-radius:3px;text-align:center;transition:background .15s}
.bb:hover{background:#e05510}
.ts{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#323232;color:#fff;padding:12px 28px;border-radius:24px;font-size:.9rem;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.25);animation:fu .3s ease;white-space:nowrap;pointer-events:none}
@keyframes fu{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200}
/* Cart panel */
.pp{position:fixed;top:0;right:0;width:360px;max-width:95vw;height:100vh;background:#fff;z-index:201;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.15);animation:sl .25s ease}
@keyframes sl{from{transform:translateX(100%)}to{transform:translateX(0)}}
.ph{background:#2874f0;color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.ph h2{font-size:1.1rem;font-weight:700}
.px{background:transparent;color:#fff;font-size:1.5rem;line-height:1;padding:2px 6px}
.pb{flex:1;overflow-y:auto}
.pe{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:#878787;font-size:.9rem}
.pi{display:flex;gap:12px;padding:14px 20px;border-bottom:1px solid #f0f0f0;align-items:flex-start}
.pg{width:60px;height:60px;object-fit:contain;border-radius:4px;background:#f8f9fa;padding:4px;flex-shrink:0}
.pf{flex:1;min-width:0}
.pn{font-size:.83rem;font-weight:500;line-height:1.3;margin-bottom:4px}
.pr{font-size:.9rem;font-weight:700}
.pd{background:transparent;color:#bbb;font-size:1.1rem;padding:2px 4px;transition:color .15s}
.pd:hover{color:#f44336}
.pft{padding:16px 20px;border-top:1px solid #e0e0e0}
.pt{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ptl{font-size:.9rem;color:#878787}
.ptp{font-size:1.2rem;font-weight:700}
.bco{width:100%;background:#fb641b;color:#fff;font-size:1rem;font-weight:700;padding:14px;border-radius:3px;transition:background .15s}
.bco:hover{background:#e05510}
/* Wishlist panel */
.wp{position:fixed;top:0;right:0;width:360px;max-width:95vw;height:100vh;background:#fff;z-index:201;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.15);animation:sl .25s ease}
.wph{background:#e53935;color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.wph h2{font-size:1.1rem;font-weight:700}
.wpx{background:transparent;color:#fff;font-size:1.5rem;line-height:1;padding:2px 6px}
.wpb{flex:1;overflow-y:auto}
.wpe{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:#878787;font-size:.9rem}
.wpi{display:flex;gap:12px;padding:14px 20px;border-bottom:1px solid #f0f0f0;align-items:flex-start}
.wpg{width:60px;height:60px;object-fit:contain;border-radius:4px;background:#f8f9fa;padding:4px;flex-shrink:0}
.wpf{flex:1;min-width:0}
.wpn{font-size:.83rem;font-weight:500;line-height:1.3;margin-bottom:4px}
.wpr{font-size:.85rem;font-weight:700}
.wpd{background:transparent;color:#bbb;font-size:1.1rem;padding:2px 4px;transition:color .15s}
.wpd:hover{color:#f44336}
.wpmv{margin-top:6px;background:#2874f0;color:#fff;font-size:.76rem;font-weight:600;padding:5px 12px;border-radius:3px;transition:background .15s}
.wpmv:hover{background:#1a5dc8}
@media(max-width:600px){.gr{grid-template-columns:repeat(2,1fr);gap:8px}.iw{height:150px}.nr{gap:4px}.btnrow{flex-direction:column;gap:6px}}
</style>
</head>
<body>
<nav class="nb">
  <div class="ni">
    <div><span class="lt">Flipkart</span><span class="ls"><em>Explore</em> <b>Plus</b> ⭐</span></div>
    <div class="se"><span class="si">🔍</span><input type="text" id="s" placeholder="Search products…"/></div>
    <div class="nr">
      <button class="bl">Login</button>
      <button class="bw" id="wBtn">❤️ Wishlist<span class="wbg" id="wbdg">0</span></button>
      <button class="bc" id="cBtn">🛒 Cart<span class="bg" id="bdg">0</span></button>
    </div>
  </div>
</nav>
<main class="mn">
  <div class="st">All Products</div>
  <div class="gr" id="gr"></div>
</main>
<div class="ov" id="ov" style="display:none" onclick="closeAll()"></div>
<div class="pp" id="pp" style="display:none">
  <div class="ph"><h2>🛒 My Cart</h2><button class="px" onclick="cC()">✕</button></div>
  <div class="pb" id="pb"></div>
  <div class="pft" id="pft" style="display:none">
    <div class="pt"><span class="ptl">Total</span><span class="ptp" id="ptot">₹0</span></div>
    <button class="bco">Place Order</button>
  </div>
</div>
<div class="wp" id="wp" style="display:none">
  <div class="wph"><h2>❤️ Wishlist</h2><button class="wpx" onclick="cW()">✕</button></div>
  <div class="wpb" id="wpb"></div>
</div>

let C=[];
let W=[];
const $=id=>document.getElementById(id);

const heartSVG=(active)=>`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path class="hfill" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;

const rG=l=>{
  const g=$("gr");
  if(!l.length){g.innerHTML="<div style='text-align:center;padding:60px;background:#fff;border-radius:4px'><div style='font-size:2.5rem'>🔍</div><p style='color:#878787;margin-top:12px'>No results found</p></div>";return;}
  g.innerHTML=l.map(p=>{
    const inW=W.some(x=>x.id===p.id);
    const discBanner=p.disc?`<div class="dstk">${p.disc}% OFF</div>`:"";
    const priceRow=p.disc?`<div class="prow"><span class="cp">${f(p.p)}</span><span class="cop">${f(p.op)}</span><span class="dbg">${p.disc}% off</span></div>`:`<div class="prow"><span class="cp">${f(p.p)}</span></div>`;
    return `<div class="cd">
      <div class="iw">
        ${discBanner}
        <button class="hb${inW?' on':''}" onclick="toggleW(${p.id})" title="${inW?'Remove from Wishlist':'Add to Wishlist'}">
          ${heartSVG(inW)}
        </button>
        <img class="ci" src="${p.i}" alt="${p.n}"/>
      </div>
      <div class="cb">
        <div class="cn">${p.n}</div>
        ${priceRow}
        <div class="btnrow">
          <button class="ba" onclick="aC(${p.id})">Add to Cart</button>
          <button class="bb" onclick="buyNow(${p.id})">Buy Now</button>
        </div>
      </div>
    </div>`;
  }).join("");
};

const aC=id=>{
  const p=P.find(x=>x.id===id),e=C.find(x=>x.id===id);
  e?e.q++:C.push({...p,q:1});
  uB();sT(p.n+" added to cart ✓");
};

const buyNow=id=>{
  const p=P.find(x=>x.id===id),e=C.find(x=>x.id===id);
  e?e.q++:C.push({...p,q:1});
  uB();oC();
};

const toggleW=id=>{
  const p=P.find(x=>x.id===id);
  const idx=W.findIndex(x=>x.id===id);
  if(idx>=0){W.splice(idx,1);sT(p.n+" removed from Wishlist");}
  else{W.push({...p});sT(p.n+" added to Wishlist ❤️");}
  uWB();
  // Re-render grid to update heart state
  const q=$("s").value.toLowerCase().trim();
  rG(q?P.filter(pp=>pp.n.toLowerCase().includes(q)):P);
};

const rC=id=>{C=C.filter(x=>x.id!==id);uB();dC();};
const rW=id=>{W=W.filter(x=>x.id!==id);uWB();dW();};
const mvWtoC=id=>{aC(id);rW(id);};

const uB=()=>$("bdg").textContent=C.reduce((s,x)=>s+x.q,0);
const uWB=()=>$("wbdg").textContent=W.length;

const dC=()=>{
  const b=$("pb"),ft=$("pft");
  if(!C.length){b.innerHTML='<div class="pe"><span style="font-size:3rem">🛒</span><span>Cart is empty</span></div>';ft.style.display="none";return;}
  b.innerHTML=C.map(i=>`<div class="pi"><img class="pg" src="${i.i}" alt="${i.n}"/><div class="pf"><div class="pn">${i.n}${i.q>1?" ×"+i.q:""}</div><div class="pr">${f(i.p*i.q)}</div></div><button class="pd" onclick="rC(${i.id})">✕</button></div>`).join("");
  $("ptot").textContent=f(C.reduce((s,x)=>s+x.p*x.q,0));
  ft.style.display="block";
};

const dW=()=>{
  const b=$("wpb");
  if(!W.length){b.innerHTML='<div class="wpe"><span style="font-size:3rem">❤️</span><span>Wishlist is empty</span><span style="font-size:.8rem;color:#aaa">Click the ❤ on any product</span></div>';return;}
  b.innerHTML=W.map(i=>`<div class="wpi"><img class="wpg" src="${i.i}" alt="${i.n}"/><div class="wpf"><div class="wpn">${i.n}</div><div class="wpr">${f(i.p)}${i.disc?` <span style="color:#388e3c;font-size:.72rem">${i.disc}% off</span>`:""}</div><button class="wpmv" onclick="mvWtoC(${i.id})">Move to Cart</button></div><button class="wpd" onclick="rW(${i.id})">✕</button></div>`).join("");
};

const oC=()=>{dC();$("pp").style.display="flex";$("ov").style.display="block";$("wp").style.display="none";};
const cC=()=>{$("pp").style.display="none";$("ov").style.display="none";};
const oW=()=>{dW();$("wp").style.display="flex";$("ov").style.display="block";$("pp").style.display="none";};
const cW=()=>{$("wp").style.display="none";$("ov").style.display="none";};
